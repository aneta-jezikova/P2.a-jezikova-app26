<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Sweet Dream Cukrárna</title>

<style>
body {
    font-family: Arial;
    background: #ffe6f0;
    text-align: center;
}

h1 {
    color: #e60073;
}

.produkt {
    background: white;
    padding: 10px;
    margin: 10px;
    border-radius: 15px;
    display: inline-block;
    width: 200px;
    box-shadow: 0 0 10px pink;
}

button {
    background: #ff66b2;
    color: white;
    border: none;
    padding: 15px;
    margin-top: 20px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
}

input {
    padding: 5px;
    margin: 5px;
}
</style>

</head>

<body>

<h1>🍰 Sweet Dream Cukrárna 🍩</h1>

<div id="produkty"></div>

<h2>Celková cena: <span id="cena">0</span> Kč</h2>
<h2>Počet kusů: <span id="kusy">0</span></h2>

<h3>Vaše údaje</h3>
<input type="text" id="jmeno" placeholder="Jméno a příjmení"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="tel" id="telefon" placeholder="Telefon"><br>

<button onclick="odeslat()">ODESLAT OBJEDNÁVKU</button>

<script>
let produkty = [];

fetch('produkty.csv')
.then(res => res.text())
.then(text => {
    let radky = text.split('\n').slice(1);

    radky.forEach((r, i) => {
        let [nazev, cena] = r.split(',');

        produkty.push({nazev, cena: Number(cena)});

        document.getElementById("produkty").innerHTML += `
        <div class="produkt">
        <b>${nazev}</b><br>
        ${cena} Kč<br>
        <input type="number" id="p${i}" value="0" min="0">
        </div>`;
    });
});

function spocitej() {
    let cena = 0;
    let kusy = 0;

    produkty.forEach((p, i) => {
        let pocet = Number(document.getElementById("p"+i).value);
        cena += pocet * p.cena;
        kusy += pocet;
    });

    document.getElementById("cena").innerText = cena;
    document.getElementById("kusy").innerText = kusy;
}

setInterval(spocitej, 500);

function odeslat() {
    let jmeno = document.getElementById("jmeno").value;
    let email = document.getElementById("email").value;
    let tel = document.getElementById("telefon").value;

    let text = "Objednávka:\n";

    produkty.forEach((p, i) => {
        let pocet = document.getElementById("p"+i).value;
        if(pocet > 0){
            text += p.nazev + " x " + pocet + "\n";
        }
    });

    text += "\nCena: " + document.getElementById("cena").innerText + " Kč";
    text += "\nKusů: " + document.getElementById("kusy").innerText;
    text += "\n\nJméno: " + jmeno;
    text += "\nEmail: " + email;
    text += "\nTelefon: " + tel;

    window.location.href =
    `mailto:app@kostka-skola.cz?subject=Objednavka&body=${encodeURIComponent(text)}`;
}
</script>

</body>
</html>

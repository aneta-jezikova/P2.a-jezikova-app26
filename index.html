<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🍰 Cukrárna Sweet Dream</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #ffd6e7, #ffe6f0);
    text-align: center;
}

h1 {
    color: #e60073;
}

.produkt {
    background: white;
    padding: 15px;
    margin: 10px;
    border-radius: 15px;
    display: inline-block;
    width: 200px;
    box-shadow: 0 0 10px pink;
}

button {
    background: #ff66b2;
    color: white;
    border: none;
    padding: 15px;
    margin-top: 20px;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
}

input {
    padding: 5px;
    margin: 5px;
}
</style>

</head>

<body>

<h1>🍰 Sweet Dream Cukrárna 🍩</h1>

<div id="produkty"></div>

<h2>Celková cena: <span id="cena">0</span> Kč</h2>
<h2>Počet kusů: <span id="kusy">0</span></h2>

<h3>Vaše údaje</h3>
<input type="text" id="jmeno" placeholder="Jméno a příjmení"><br>
<input type="email" id="email" placeholder="Email"><br>
<input type="tel" id="telefon" placeholder="Telefon"><br>

<button onclick="odeslat()">ODESLAT OBJEDNÁVKU</button>

<script>
let produkty = [
{name:"Dort čokoládový",price:120},
{name:"Dort jahodový",price:130},
{name:"Cheesecake",price:110},
{name:"Makronky",price:80},
{name:"Kobliha",price:35},
{name:"Croissant",price:40},
{name:"Donut",price:45},
{name:"Zmrzlina",price:50},
{name:"Cupcake",price:60}
];

produkty.forEach((p,i)=>{
document.getElementById("produkty").innerHTML+=`
<div class="produkt">
<b>${p.name}</b><br>
${p.price} Kč<br>
<input id="p${i}" type="number" value="0" min="0">
</div>`;
});

setInterval(()=>{
let cena=0,kusy=0;
produkty.forEach((p,i)=>{
let v=Number(document.getElementById("p"+i).value);
cena+=v*p.price;
kusy+=v;
});
document.getElementById("cena").innerText=cena;
document.getElementById("kusy").innerText=kusy;
},500);

function odeslat(){
let jmeno = document.getElementById("jmeno").value;
let email = document.getElementById("email").value;
let tel = document.getElementById("telefon").value;

let text="Objednávka:\n";

produkty.forEach((p,i)=>{
let v=document.getElementById("p"+i).value;
if(v>0){
text+=p.name+" x "+v+"\n";
}
});

text+="\nCena: "+document.getElementById("cena").innerText+" Kč";
text+="\nKusů: "+document.getElementById("kusy").innerText;
text+="\n\nJméno: "+jmeno;
text+="\nEmail: "+email;
text+="\nTelefon: "+tel;

window.location.href=
`mailto:app@kostka-skola.cz?subject=Objednavka&body=${encodeURIComponent(text)}`;
}
</script>

</body>
</html>
